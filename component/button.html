<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>button</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/component/button.css">

  <style>
    body {
      padding: 1rem;
    }
    h2{
      display: flex;
      align-items: center;
      gap: var(--gap-8);
      font-size: 45px;
      font-weight: bold;
      margin-bottom: 20px;
      color: var( --primary-700);
    }
    .base {
      display: inline-block;
      font-size: 38px;
      font-weight: 500;
      color: var(--gray-800);
    }
    .grid--2 { --cols: 2; }
    .grid--3 { --cols: 3; }
    .grid--4 { --cols: 4; }
    .grid--6 { --cols: 6; }
    .grid--8 { --cols: 8; }
  </style>
</head>
<body>
  <h2>
    <span class="base">component</span>
    <img src="/images/icon/arrow.png" alt="메뉴" width="23" height="32">    
    button
  </h2>
  <div class="grid grid--2 boards" style="max-width: 1920px;">
    <!-- ============ PRESSED ============ -->
    <section class="board">
      <div class="matrix">
        <span class="matrix__head">Primary</span>
        <span class="matrix__head">Default</span>
        <span class="matrix__head">Dashed</span>
        <span class="matrix__head">Text</span>
        <span class="matrix__head">Link</span>

        <button class="btn btn--primary btn--lg is-pressed">Button</button>
        <button class="btn btn--default btn--lg is-pressed">Button</button>
        <button class="btn btn--dashed btn--lg is-pressed">Button</button>
        <button class="btn btn--text btn--lg is-pressed">Button</button>
        <button class="btn btn--link btn--lg is-pressed">Button</button>

        <button class="btn btn--primary is-pressed">Button</button>
        <button class="btn btn--default is-pressed">Button</button>
        <button class="btn btn--dashed is-pressed">Button</button>
        <button class="btn btn--text is-pressed">Button</button>
        <button class="btn btn--link is-pressed">Button</button>

        <button class="btn btn--primary btn--sm is-pressed">Button</button>
        <button class="btn btn--default btn--sm is-pressed">Button</button>
        <button class="btn btn--dashed btn--sm is-pressed">Button</button>
        <button class="btn btn--text btn--sm is-pressed">Button</button>
        <button class="btn btn--link btn--sm is-pressed">Button</button>

        <span class="matrix__divider"></span>

        <button class="btn btn--primary btn--lg btn--round is-pressed">Button</button>
        <button class="btn btn--default btn--lg btn--round is-pressed">Button</button>
        <button class="btn btn--dashed btn--lg btn--round is-pressed">Button</button>
        <button class="btn btn--text btn--lg btn--round is-pressed">Button</button>
        <button class="btn btn--link btn--lg btn--round is-pressed">Button</button>

        <button class="btn btn--primary btn--round is-pressed">Button</button>
        <button class="btn btn--default btn--round is-pressed">Button</button>
        <button class="btn btn--dashed btn--round is-pressed">Button</button>
        <button class="btn btn--text btn--round is-pressed">Button</button>
        <button class="btn btn--link btn--round is-pressed">Button</button>

        <button class="btn btn--primary btn--sm btn--round is-pressed">Button</button>
        <button class="btn btn--default btn--sm btn--round is-pressed">Button</button>
        <button class="btn btn--dashed btn--sm btn--round is-pressed">Button</button>
        <button class="btn btn--text btn--sm btn--round is-pressed">Button</button>
        <button class="btn btn--link btn--sm btn--round is-pressed">Button</button>
      </div>
    </section>
    <!-- ============ DISABLED ============ -->
    <section class="board">
      <div class="matrix">
        <span class="matrix__head">Primary</span>
        <span class="matrix__head">Default</span>
        <span class="matrix__head">Dashed</span>
        <span class="matrix__head">Text</span>
        <span class="matrix__head">Link</span>

        <button class="btn btn--primary btn--lg" disabled>Button</button>
        <button class="btn btn--default btn--lg" disabled>Button</button>
        <button class="btn btn--dashed btn--lg" disabled>Button</button>
        <button class="btn btn--text btn--lg" disabled>Button</button>
        <button class="btn btn--link btn--lg" disabled>Button</button>

        <button class="btn btn--primary" disabled>Button</button>
        <button class="btn btn--default" disabled>Button</button>
        <button class="btn btn--dashed" disabled>Button</button>
        <button class="btn btn--text" disabled>Button</button>
        <button class="btn btn--link" disabled>Button</button>

        <button class="btn btn--primary btn--sm" disabled>Button</button>
        <button class="btn btn--default btn--sm" disabled>Button</button>
        <button class="btn btn--dashed btn--sm" disabled>Button</button>
        <button class="btn btn--text btn--sm" disabled>Button</button>
        <button class="btn btn--link btn--sm" disabled>Button</button>

        <span class="matrix__divider"></span>

        <button class="btn btn--primary btn--lg btn--round" disabled>Button</button>
        <button class="btn btn--default btn--lg btn--round" disabled>Button</button>
        <button class="btn btn--dashed btn--lg btn--round" disabled>Button</button>
        <button class="btn btn--text btn--lg btn--round" disabled>Button</button>
        <button class="btn btn--link btn--lg btn--round" disabled>Button</button>

        <button class="btn btn--primary btn--round" disabled>Button</button>
        <button class="btn btn--default btn--round" disabled>Button</button>
        <button class="btn btn--dashed btn--round" disabled>Button</button>
        <button class="btn btn--text btn--round" disabled>Button</button>
        <button class="btn btn--link btn--round" disabled>Button</button>

        <button class="btn btn--primary btn--sm btn--round" disabled>Button</button>
        <button class="btn btn--default btn--sm btn--round" disabled>Button</button>
        <button class="btn btn--dashed btn--sm btn--round" disabled>Button</button>
        <button class="btn btn--text btn--sm btn--round" disabled>Button</button>
        <button class="btn btn--link btn--sm btn--round" disabled>Button</button>
      </div>
    </section>
    <!-- ============ LOADING ============ -->
    <section class="board">
      <div class="matrix">
        <span class="matrix__head">Primary</span>
        <span class="matrix__head">Default</span>
        <span class="matrix__head">Dashed</span>
        <span class="matrix__head">Text</span>
        <span class="matrix__head">Link</span>

        <button class="btn btn--primary is-loading"><span class="btn__label">Button</span></button>
        <button class="btn btn--default is-loading"><span class="btn__label">Button</span></button>
        <button class="btn btn--dashed is-loading"><span class="btn__label">Button</span></button>
        <button class="btn btn--text is-loading"><span class="btn__label">Button</span></button>
        <button class="btn btn--link is-loading"><span class="btn__label">Button</span></button>
      </div>
    </section>

    <!--sns 로그인 버튼 -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
      <!-- 구글(컬러) -->
      <symbol id="ic-google-color" viewBox="0 0 24 24">
        <path d="M23.766 12.2764C23.766 11.4607 23.6999 10.6406 23.5588 9.83807H12.24V14.4591H18.7217C18.4528 15.9494 17.5885 17.2678 16.323 18.1056V21.1039H20.19C22.4608 19.0139 23.766 15.9274 23.766 12.2764Z" fill="#4285F4"/>
        <path d="M12.2401 24.0008C15.4766 24.0008 18.2059 22.9382 20.1945 21.1039L16.3276 18.1055C15.2517 18.8375 13.8627 19.252 12.2445 19.252C9.11388 19.252 6.45946 17.1399 5.50705 14.3003H1.5166V17.3912C3.55371 21.4434 7.7029 24.0008 12.2401 24.0008Z" fill="#34A853"/>
        <path d="M5.50253 14.3003C4.99987 12.8099 4.99987 11.1961 5.50253 9.70575V6.61481H1.51649C-0.18551 10.0056 -0.18551 14.0004 1.51649 17.3912L5.50253 14.3003Z" fill="#FBBC04"/>
        <path d="M12.2401 4.74966C13.9509 4.7232 15.6044 5.36697 16.8434 6.54867L20.2695 3.12262C18.1001 1.0855 15.2208 -0.034466 12.2401 0.000808666C7.7029 0.000808666 3.55371 2.55822 1.5166 6.61481L5.50264 9.70575C6.45064 6.86173 9.10947 4.74966 12.2401 4.74966Z" fill="#EA4335"/>
      </symbol>
      <!-- 구글(모노) : currentColor 상속 -->
      <symbol id="ic-google-mono" viewBox="0 0 24 24">
        <path fill="currentColor" d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307C18.747 1.44 16.133 0 12.48 0 5.867 0 .307 5.387.307 12s5.56 12 12.173 12c3.573 0 6.267-1.173 8.373-3.36 2.16-2.16 2.84-5.213 2.84-7.667 0-.76-.053-1.467-.173-2.053H12.48z"/>
      </symbol>
      <!-- 페이스북 : currentColor 상속 -->
      <symbol id="ic-facebook" viewBox="0 0 24 24">
        <path fill="currentColor" d="M24 12C24 5.37258 18.6274 0 12 0C5.37258 0 0 5.37258 0 12C0 17.9895 4.3882 22.954 10.125 23.8542V15.4688H7.07812V12H10.125V9.35625C10.125 6.34875 11.9166 4.6875 14.6576 4.6875C15.9701 4.6875 17.3438 4.92188 17.3438 4.92188V7.875H15.8306C14.34 7.875 13.875 8.80008 13.875 9.75V12H17.2031L16.6711 15.4688H13.875V23.8542C19.6118 22.954 24 17.9895 24 12Z"/>
      </symbol>
      <!-- 애플 : currentColor 상속 -->
      <symbol id="ic-apple" viewBox="0 0 24 24">
        <path fill="currentColor" d="M20.8426 17.1449C20.5099 17.9135 20.1161 18.6211 19.6598 19.2715C19.0378 20.1583 18.5286 20.7721 18.1361 21.113C17.5277 21.6724 16.8759 21.959 16.1779 21.9753C15.6768 21.9753 15.0725 21.8327 14.3691 21.5434C13.6633 21.2555 13.0148 21.113 12.4217 21.113C11.7998 21.113 11.1327 21.2555 10.4193 21.5434C9.70469 21.8327 9.12904 21.9834 8.68892 21.9984C8.01957 22.0269 7.35239 21.7322 6.68644 21.113C6.26139 20.7422 5.72974 20.1067 5.09285 19.2063C4.40951 18.2449 3.84772 17.13 3.4076 15.8589C2.93624 14.486 2.69995 13.1565 2.69995 11.8694C2.69995 10.3951 3.01853 9.12345 3.65665 8.05784C4.15815 7.20191 4.82533 6.52672 5.66035 6.03105C6.49537 5.53539 7.39761 5.2828 8.36925 5.26664C8.9009 5.26664 9.59809 5.43109 10.4645 5.75429C11.3284 6.07858 11.8832 6.24303 12.1264 6.24303C12.3082 6.24303 12.9245 6.05074 13.9692 5.66738C14.9571 5.31186 15.7909 5.16466 16.474 5.22264C18.3249 5.37202 19.7155 6.10167 20.6402 7.41619C18.9849 8.4192 18.166 9.82403 18.1823 11.6262C18.1972 13.03 18.7065 14.1981 19.7073 15.1256C20.1609 15.5561 20.6674 15.8888 21.231 16.1251C21.1087 16.4795 20.9797 16.819 20.8426 17.1449ZM16.5975 0.440369C16.5975 1.54062 16.1956 2.56792 15.3944 3.51878C14.4275 4.64917 13.258 5.30236 11.9898 5.19929C11.9736 5.06729 11.9642 4.92837 11.9642 4.78239C11.9642 3.72615 12.424 2.59576 13.2406 1.67152C13.6483 1.20356 14.1667 0.814453 14.7955 0.504058C15.4229 0.198295 16.0163 0.0292007 16.5744 0.000244141C16.5907 0.147331 16.5975 0.294426 16.5975 0.440355V0.440369Z"/>
      </symbol>
    </svg>
    <div class="page">
      <div class="sgroups">
        <!-- ===== Group 1 : filled (브랜드 공식) ===== -->
        <section class="sgroup">
          <div class="sgroup__col">
            <button class="sbtn sbtn--filled sbtn--google">
              <svg class="sbtn__icon"><use href="#ic-google-color"/></svg>
              <span class="sbtn__label">Sign in with Google</span>
            </button>
            <button class="sbtn sbtn--filled sbtn--facebook">
              <svg class="sbtn__icon"><use href="#ic-facebook"/></svg>
              <span class="sbtn__label">Sign in with Facebook</span>
            </button>
            <button class="sbtn sbtn--filled sbtn--apple">
              <svg class="sbtn__icon"><use href="#ic-apple"/></svg>
              <span class="sbtn__label">Sign in with Apple</span>
            </button>
          </div>
          <div class="sgroup__row">
            <button class="sbtn sbtn--icon sbtn--filled sbtn--google" aria-label="Sign in with Google">
              <svg class="sbtn__icon"><use href="#ic-google-color"/></svg></button>
            <button class="sbtn sbtn--icon sbtn--filled sbtn--facebook" aria-label="Sign in with Facebook">
              <svg class="sbtn__icon"><use href="#ic-facebook"/></svg></button>
            <button class="sbtn sbtn--icon sbtn--filled sbtn--apple" aria-label="Sign in with Apple">
              <svg class="sbtn__icon"><use href="#ic-apple"/></svg></button>
          </div>
        </section>

        <!-- ===== Group 2 : outline (컬러 아이콘) ===== -->
        <section class="sgroup">
          <div class="sgroup__col">
            <button class="sbtn sbtn--outline sbtn--google">
              <svg class="sbtn__icon"><use href="#ic-google-color"/></svg>
              <span class="sbtn__label">Sign in with Google</span>
            </button>
            <button class="sbtn sbtn--outline sbtn--facebook">
              <svg class="sbtn__icon"><use href="#ic-facebook"/></svg>
              <span class="sbtn__label">Sign in with Facebook</span>
            </button>
            <button class="sbtn sbtn--outline sbtn--apple">
              <svg class="sbtn__icon"><use href="#ic-apple"/></svg>
              <span class="sbtn__label">Sign in with Apple</span>
            </button>
          </div>
          <div class="sgroup__row">
            <button class="sbtn sbtn--icon sbtn--outline sbtn--google" aria-label="Sign in with Google">
              <svg class="sbtn__icon"><use href="#ic-google-color"/></svg></button>
            <button class="sbtn sbtn--icon sbtn--outline sbtn--facebook" aria-label="Sign in with Facebook">
              <svg class="sbtn__icon"><use href="#ic-facebook"/></svg></button>
            <button class="sbtn sbtn--icon sbtn--outline sbtn--apple" aria-label="Sign in with Apple">
              <svg class="sbtn__icon"><use href="#ic-apple"/></svg></button>
          </div>
        </section>

        <!-- ===== Group 3 : mono (그레이 아이콘) ===== -->
        <section class="sgroup">
          <div class="sgroup__col">
            <button class="sbtn sbtn--mono sbtn--google">
              <svg class="sbtn__icon"><use href="#ic-google-mono"/></svg>
              <span class="sbtn__label">Sign in with Google</span>
            </button>
            <button class="sbtn sbtn--mono sbtn--facebook">
              <svg class="sbtn__icon"><use href="#ic-facebook"/></svg>
              <span class="sbtn__label">Sign in with Facebook</span>
            </button>
            <button class="sbtn sbtn--mono sbtn--apple">
              <svg class="sbtn__icon"><use href="#ic-apple"/></svg>
              <span class="sbtn__label">Sign in with Apple</span>
            </button>
          </div>
          <div class="sgroup__row">
            <button class="sbtn sbtn--icon sbtn--mono sbtn--google" aria-label="Sign in with Google">
              <svg class="sbtn__icon"><use href="#ic-google-mono"/></svg></button>
            <button class="sbtn sbtn--icon sbtn--mono sbtn--facebook" aria-label="Sign in with Facebook">
              <svg class="sbtn__icon"><use href="#ic-facebook"/></svg></button>
            <button class="sbtn sbtn--icon sbtn--mono sbtn--apple" aria-label="Sign in with Apple">
              <svg class="sbtn__icon"><use href="#ic-apple"/></svg></button>
          </div>
        </section>
      </div>
    </div>
  </div>
</body>
</html>
