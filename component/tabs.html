<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabs</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/component/tabs.css">
  <style>
    body {
      padding: 1rem;
    }
    h2{
      display: flex;
      align-items: center;
      gap: var(--gap-8);
      font-size: 45px;
      font-weight: bold;
      margin-bottom: 20px;
      color: var( --primary-700);
    }
    .base {
      display: inline-block;
      font-size: 38px;
      font-weight: 500;
      color: var(--gray-800);
    }
  </style>
</head>
<body>
  <h2>
    <span class="base">component</span>
    <img src="/images/icon/arrow.png" alt="메뉴" width="23" height="32">
    Tabs
  </h2>

  <h3 style="margin-bottom: 12px;">기본 (Underline)</h3>
  <div class="tabs" data-tabs style="max-width: 480px;">
    <div class="tabs__list" role="tablist">
      <button type="button" class="tabs__tab" role="tab" id="tab-overview" aria-selected="true" data-tab="overview">개요</button>
      <button type="button" class="tabs__tab" role="tab" id="tab-activity" aria-selected="false" data-tab="activity">활동</button>
      <button type="button" class="tabs__tab" role="tab" id="tab-settings" aria-selected="false" data-tab="settings">설정</button>
    </div>
    <div class="tabs__panel is-active" role="tabpanel" data-tab-panel="overview">계정 개요 정보가 여기에 표시됩니다. 가입일, 요약 통계 등을 보여주는 영역입니다.</div>
    <div class="tabs__panel" role="tabpanel" data-tab-panel="activity">최근 활동 내역이 시간순으로 나열되는 영역입니다.</div>
    <div class="tabs__panel" role="tabpanel" data-tab-panel="settings">알림, 권한 등 세부 설정을 변경하는 영역입니다.</div>
  </div>

  <h3 style="margin: 32px 0 12px;">Pill (세그먼트 컨트롤)</h3>
  <div class="tabs tabs--pill" data-tabs style="max-width: 480px;">
    <div class="tabs__list" role="tablist">
      <button type="button" class="tabs__tab" role="tab" aria-selected="true" data-tab="monthly">월간</button>
      <button type="button" class="tabs__tab" role="tab" aria-selected="false" data-tab="weekly">주간</button>
      <button type="button" class="tabs__tab" role="tab" aria-selected="false" data-tab="daily">일간</button>
    </div>
    <div class="tabs__panel is-active" role="tabpanel" data-tab-panel="monthly">월간 리포트 데이터입니다.</div>
    <div class="tabs__panel" role="tabpanel" data-tab-panel="weekly">주간 리포트 데이터입니다.</div>
    <div class="tabs__panel" role="tabpanel" data-tab-panel="daily">일간 리포트 데이터입니다.</div>
  </div>

  <script src="/js/main.js"></script>
</body>
</html>
