<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alert / Banner</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/component/alert.css">
  <style>
    body {
      padding: 1rem;
    }
    h2{
      display: flex;
      align-items: center;
      gap: var(--gap-8);
      font-size: 45px;
      font-weight: bold;
      margin-bottom: 20px;
      color: var( --primary-700);
    }
    .base {
      display: inline-block;
      font-size: 38px;
      font-weight: 500;
      color: var(--gray-800);
    }
    .demo-col {
      display: flex;
      flex-direction: column;
      gap: var(--gap-12);
      max-width: 480px;
    }
  </style>
</head>
<body>
  <h2>
    <span class="base">component</span>
    <img src="/images/icon/arrow.png" alt="메뉴" width="23" height="32">
    Alert / Banner
  </h2>

  <h3 style="margin-bottom: 12px;">Banner (화면 상단 공지)</h3>
  <div class="banner">
    새로운 기능이 추가되었습니다.
    <button type="button" class="banner__action">자세히 보기</button>
    <button type="button" class="banner__close" aria-label="닫기" data-dismiss="banner">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M12 4L4 12M4 4L12 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <h3 style="margin: 32px 0 12px;">Alert (콘텐츠 안 메시지)</h3>
  <div class="demo-col">
    <div class="alert">
      <svg class="alert__icon" viewBox="0 0 20 20" fill="none">
        <path d="M10 6.66667V10M10 13.3333H10.0083M18.3333 10C18.3333 14.6024 14.6024 18.3333 10 18.3333C5.39763 18.3333 1.66667 14.6024 1.66667 10C1.66667 5.39763 5.39763 1.66667 10 1.66667C14.6024 1.66667 18.3333 5.39763 18.3333 10Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="alert__body">
        <div class="alert__title">참고</div>
        <div class="alert__desc">변경 사항은 저장 후 최대 5분 내에 반영됩니다.</div>
      </div>
      <button type="button" class="alert__close" aria-label="닫기" data-dismiss="alert">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M12 4L4 12M4 4L12 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <div class="alert alert--primary">
      <svg class="alert__icon" viewBox="0 0 20 20" fill="none">
        <path d="M6.66667 10L9.16667 12.5L14.1667 6.66667M18.3333 10C18.3333 14.6024 14.6024 18.3333 10 18.3333C5.39763 18.3333 1.66667 14.6024 1.66667 10C1.66667 5.39763 5.39763 1.66667 10 1.66667C14.6024 1.66667 18.3333 5.39763 18.3333 10Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="alert__body">
        <div class="alert__title">저장 완료</div>
        <div class="alert__desc">모든 변경 사항이 정상적으로 저장되었습니다.</div>
      </div>
      <button type="button" class="alert__close" aria-label="닫기" data-dismiss="alert">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M12 4L4 12M4 4L12 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <div class="alert alert--error">
      <svg class="alert__icon" viewBox="0 0 20 20" fill="none">
        <path d="M10 6.66667V10M10 13.3333H10.0083M18.3333 10C18.3333 14.6024 14.6024 18.3333 10 18.3333C5.39763 18.3333 1.66667 14.6024 1.66667 10C1.66667 5.39763 5.39763 1.66667 10 1.66667C14.6024 1.66667 18.3333 5.39763 18.3333 10Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="alert__body">
        <div class="alert__title">저장 실패</div>
        <div class="alert__desc">네트워크 오류가 발생했습니다. 잠시 후 다시 시도해주세요.</div>
      </div>
      <button type="button" class="alert__close" aria-label="닫기" data-dismiss="alert">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M12 4L4 12M4 4L12 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <script src="/js/main.js"></script>
</body>
</html>
